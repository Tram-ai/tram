id = "tram"
name = "TRAM"
version = "0.1.0"
schema_version = 1
authors = ["Qwen Team"]
description = "TRAM Agent Server Extension for Zed"
repository = "https://github.com/tram-ai/tram"

[agent_servers.tram-code]
name = "TRAM"
icon = "tram.svg"

[agent_servers.tram-code.targets.darwin-aarch64]
archive = "https://registry.npmjs.org/@tram-ai/tram/-/tram-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.tram-code.targets.darwin-x86_64]
archive = "https://registry.npmjs.org/@tram-ai/tram/-/tram-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.tram-code.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@tram-ai/tram/-/tram-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.tram-code.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@tram-ai/tram/-/tram-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

