name: "Build Knowledge Base"

on:
  workflow_dispatch:

jobs:
  build-knowledge-base:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ 初始化一个最小项目
      - name: Init temp project
        run: npm init -y

      # ✅ 安装你需要的依赖（可以多写几个）
      - name: Install deps
        run: |
          npm i @orama/orama

      - name: Build knowledge base
        env:
          OUTPUT_DIR: knowledge-base-output
          #临时ban SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: node scripts/build-knowledge-base.js

      - name: Verify generated files
        run: |
          test -f knowledge-base-output/catalog.json
          test -f knowledge-base-output/docs-db.json
          test -f knowledge-base-output/vectors-db.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-base-artifacts
          path: knowledge-base-output
