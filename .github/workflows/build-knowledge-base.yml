name: "Build Knowledge Base"

on:
  push:
    branches:
      - "main"
    paths:
      - "knowledge/**/*.md"
      - "scripts/build-knowledge-base.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-knowledge-base.yml"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: "read"

defaults:
  run:
    shell: "bash"

jobs:
  build-knowledge-base:
    name: "Build Knowledge Base Artifact"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8" # ratchet:actions/checkout@v5

      - name: "Set up Node.js"
        uses: "actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020" # ratchet:actions/setup-node@v4.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm init"

      - name: "Install"
        run: "npm i @orama/orama"

      - name: "Build knowledge base"
        env:
          OUTPUT_DIR: "knowledge-base-output"
          #先使用临时脚本自带Key SILICONFLOW_API_KEY: "${{ secrets.SILICONFLOW_API_KEY }}"
        run: "node scripts/build-knowledge-base.js"

      - name: "Verify generated files"
        run: |
          test -f knowledge-base-output/catalog.json
          test -f knowledge-base-output/docs-db.json
          test -f knowledge-base-output/vectors-db.json

      - name: "Upload knowledge base artifact"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # ratchet:actions/upload-artifact@v4
        with:
          name: "knowledge-base-artifacts"
          path: "knowledge-base-output"
          if-no-files-found: "error"
          retention-days: 30
